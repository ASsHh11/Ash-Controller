<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARSLAN-ASH AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --glass: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; overflow: hidden; background: #000; font-family: 'Montserrat', sans-serif; color: #fff; }
        
        canvas { position: absolute; inset: 0; z-index: 1; cursor: move; }

        /* Glass Sidebar */
        .sidebar {
            position: fixed; left: 20px; top: 100px; bottom: 120px; width: 350px;
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px;
            z-index: 100; padding: 25px; display: flex; flex-direction: column;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); transition: 0.5s;
        }
        .sidebar.hidden { transform: translateX(-400px); }

        .logo-area { position: fixed; top: 30px; width: 100%; text-align: center; z-index: 100; pointer-events: none; }
        .logo-area h1 { font-family: 'Cinzel', serif; font-size: 1.8rem; letter-spacing: 12px; color: var(--gold); text-shadow: 0 0 15px rgba(212, 175, 55, 0.5); }

        /* Live Telemetry Viewport */
        .viewport { width: 100%; height: 180px; background: rgba(0,0,0,0.4); border-radius: 15px; border: 1px solid rgba(212, 175, 55, 0.2); overflow: hidden; margin-bottom: 20px; position: relative; }
        #pc-screen { width: 100%; height: 100%; object-fit: cover; display: none; }
        .view-tag { position: absolute; top: 10px; left: 10px; font-size: 0.5rem; color: var(--gold); letter-spacing: 2px; }

        #terminal { flex-grow: 1; overflow-y: auto; scrollbar-width: none; font-size: 0.85rem; color: #fff; }
        .msg { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); animation: fadeIn 0.5s; }
        .user-tag { color: var(--gold); font-size: 0.6rem; letter-spacing: 2px; margin-bottom: 5px; display: block; }

        /* Glass Input */
        .input-box {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 800px; z-index: 100;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 50px;
            display: flex; padding: 8px;
        }
        input { flex-grow: 1; background: transparent; border: none; color: #fff; padding: 12px 25px; outline: none; font-size: 1rem; }
        .exec-btn { background: var(--gold); color: #000; border: none; padding: 0 35px; border-radius: 40px; cursor: pointer; font-weight: bold; letter-spacing: 1px; }

        .toggle-tab { position: fixed; left: 0; top: 50%; width: 30px; height: 60px; background: var(--gold); z-index: 110; border-radius: 0 10px 10px 0; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<canvas id="galaxy"></canvas>

<div class="logo-area"><h1>ARSLAN-ASH AI</h1></div>

<div class="toggle-tab" onclick="toggleUI()">❯</div>

<div class="sidebar" id="sidebar">
    <div class="viewport">
        <span class="view-tag">LIVE_TELEMETRY</span>
        <img id="pc-screen" src="">
        <div id="no-sig" style="display:flex; height:100%; align-items:center; justify-content:center; color:#333; font-size:0.6rem;">LINK_IDLE</div>
    </div>
    <div id="terminal">
        <div class="msg"><span class="user-tag">SYSTEM</span>Operational in deep space clusters.</div>
    </div>
</div>

<div class="input-box">
    <input type="text" id="cmd" placeholder="Command the Core..." autocomplete="off">
    <button class="exec-btn" onclick="execute()">RUN</button>
</div>

<script>
    const DB = "https://sh-controller-default-rtdb.firebaseio.com/";
    const canvas = document.getElementById('galaxy');
    const ctx = canvas.getContext('2d');
    let stars = [], scale = 1, rotation = 0;

    function init() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        stars = [];
        for(let i=0; i<800; i++) {
            let angle = Math.random() * Math.PI * 2;
            let dist = Math.pow(Math.random(), 0.5) * 400;
            stars.push({
                a: angle, d: dist, s: Math.random() * 2,
                v: (0.001 + Math.random() * 0.002) * (400/(dist+50)),
                c: i % 20 === 0 ? '#D4AF37' : '#fff'
            });
        }
    }

    function draw() {
        ctx.fillStyle = 'black'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(canvas.width/2, canvas.height/2);
        ctx.scale(scale, scale);
        ctx.rotate(rotation);
        
        stars.forEach(s => {
            s.a += s.v;
            let x = Math.cos(s.a) * s.d;
            let y = Math.sin(s.a) * s.d * 0.6; // Spiral effect
            ctx.fillStyle = s.c;
            ctx.beginPath();
            ctx.arc(x, y, s.s, 0, Math.PI*2);
            ctx.fill();
            
            // Draw Neural Connections
            ctx.strokeStyle = 'rgba(212, 175, 55, 0.02)';
            if(s.d < 150) { ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(0,0); ctx.stroke(); }
        });
        ctx.restore();
        rotation += 0.0005;
        requestAnimationFrame(draw);
    }

    // Zoom Logic
    window.addEventListener('wheel', e => { scale += e.deltaY * -0.001; scale = Math.max(0.5, Math.min(scale, 50)); });
    
    let lastDist = 0;
    window.addEventListener('touchmove', e => {
        if(e.touches.length === 2) {
            let d = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            if(lastDist) scale += (d - lastDist) * 0.01;
            lastDist = d;
        }
    });

    function toggleUI() { document.getElementById('sidebar').classList.toggle('hidden'); }

    async function execute() {
        const inp = document.getElementById('cmd');
        const val = inp.value.trim(); if(!val) return;
        const ts = Date.now();
        document.getElementById('terminal').innerHTML += `<div class="msg"><span class="user-tag">REQ</span>${val}</div>`;
        inp.value = "";
        
        await fetch(`${DB}current.json`, { method: "PUT", body: JSON.stringify({ cmd: val, time: ts, resp: "PENDING", img: "" }) });
        
        const poll = setInterval(async () => {
            const r = await fetch(`${DB}current.json`).then(d => d.json());
            if(r.time == ts && r.resp !== "PENDING") {
                document.getElementById('terminal').innerHTML += `<div class="msg"><span class="user-tag" style="color:#fff">AI</span>${r.resp}</div>`;
                if(r.img) {
                    const screen = document.getElementById('pc-screen');
                    screen.src = r.img; screen.style.display = 'block';
                    document.getElementById('no-sig').style.display = 'none';
                }
                clearInterval(poll);
            }
        }, 1000);
    }

    init(); draw();
</script>
</body>
</html>
