<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARSLAN-ASH AI | IMPERIAL GALAXY</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --cyan: #00d9ff; 
            --cyan-glow: rgba(0, 217, 255, 0.3);
            --glass: rgba(0, 10, 20, 0.7); 
            --border: rgba(0, 217, 255, 0.2);
            --gold: #ffb700;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            height: 100%; width: 100%; overflow: hidden; 
            background: #000; 
            font-family: 'Rajdhani', sans-serif; 
            color: #fff;
        }

        #galaxy-canvas { position: absolute; inset: 0; z-index: 1; }

        /* Top Header */
        .supreme-header { 
            position: fixed; top: 0; width: 100%; height: 90px; 
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%); 
            z-index: 100; text-align: center; padding-top: 20px;
        }
        .supreme-header h1 { 
            font-family: 'Orbitron', monospace; 
            font-size: clamp(1rem, 4vw, 1.5rem);
            letter-spacing: clamp(3px, 2vw, 10px); 
            color: var(--cyan); 
            text-shadow: 0 0 30px var(--cyan), 0 0 50px var(--cyan);
            font-weight: 900;
        }
        .supreme-header .subtitle {
            font-size: clamp(0.6rem, 1.5vw, 0.8rem);
            letter-spacing: 4px;
            color: #666;
            margin-top: 5px;
        }

        /* Glass Panels */
        .panel { 
            position: fixed; 
            background: var(--glass); 
            backdrop-filter: blur(20px); 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            z-index: 150;
            padding: 15px; 
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,217,255,0.05);
        }
        .panel.hidden { 
            opacity: 0; 
            transform: translateX(-100%) scale(0.9); 
            pointer-events: none; 
        }

        .left-panel { 
            left: 15px; 
            top: 110px; 
            bottom: 150px; 
            width: clamp(300px, 30vw, 440px); 
            display: flex; 
            flex-direction: column; 
        }
        
        .right-panel { 
            right: 15px; 
            top: 110px; 
            width: clamp(280px, 25vw, 350px);
        }

        .panel-header { 
            font-size: 0.65rem; 
            color: var(--cyan); 
            letter-spacing: 3px; 
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }

        .status-indicator {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--cyan);
            box-shadow: 0 0 10px var(--cyan);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        /* History Log */
        #history-log { 
            flex-grow: 1; 
            overflow-y: auto; 
            scrollbar-width: thin;
            scrollbar-color: var(--cyan) transparent;
            font-size: 0.8rem; 
            line-height: 1.6;
        }
        #history-log::-webkit-scrollbar { width: 4px; }
        #history-log::-webkit-scrollbar-track { background: transparent; }
        #history-log::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 2px; }

        .log-entry { 
            margin-bottom: 15px; 
            border-left: 2px solid var(--cyan); 
            padding-left: 12px;
            opacity: 0;
            animation: fadeInLog 0.5s forwards;
        }
        @keyframes fadeInLog {
            to { opacity: 1; }
        }

        .log-tag { 
            font-size: 0.6rem; 
            color: var(--cyan); 
            letter-spacing: 2px; 
            display: block; 
            margin-bottom: 4px; 
        }
        .log-content { color: #ccc; }
        .code-block {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(0,217,255,0.1);
            padding: 10px;
            margin-top: 8px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            color: #4af;
            line-height: 1.4;
        }

        /* Telemetry Orb */
        .telemetry-container {
            margin: 15px 0;
        }
        .telemetry-orb { 
            width: 100%; 
            height: 220px; 
            background: radial-gradient(circle at center, rgba(0,50,80,0.3), #000); 
            border: 2px solid var(--cyan); 
            border-radius: 50%; 
            position: relative;
            box-shadow: 
                inset 0 0 50px rgba(0, 217, 255, 0.2),
                0 0 30px rgba(0, 217, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
        }
        .telemetry-orb:hover {
            border-color: #fff;
            box-shadow: 
                inset 0 0 60px rgba(0, 217, 255, 0.4),
                0 0 50px var(--cyan);
            transform: scale(1.02);
        }
        
        .orb-inner {
            position: absolute;
            width: 80%;
            height: 80%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.1), transparent);
            animation: orbPulse 3s infinite;
        }
        @keyframes orbPulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .orb-status {
            position: relative;
            z-index: 2;
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: var(--cyan);
            text-shadow: 0 0 10px var(--cyan);
        }

        #pc-view-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Bottom Status Bar */
        .status-bar {
            position: fixed;
            bottom: 100px;
            left: 0;
            width: 100%;
            height: 45px;
            background: linear-gradient(90deg, rgba(255,183,0,0.15), rgba(255,183,0,0.05), rgba(255,183,0,0.15));
            border-top: 1px solid var(--gold);
            border-bottom: 1px solid var(--gold);
            z-index: 90;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', monospace;
            font-size: 0.75rem;
            letter-spacing: 3px;
            color: var(--gold);
            text-shadow: 0 0 15px var(--gold);
        }

        /* Command Deck */
        .command-deck { 
            position: fixed; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 90%; 
            max-width: 900px; 
            z-index: 100;
            background: rgba(0,0,0,0.8); 
            backdrop-filter: blur(25px);
            border: 1px solid var(--border); 
            border-radius: 50px;
            display: flex; 
            padding: 8px 15px; 
            gap: 10px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.9), 0 0 20px var(--cyan-glow);
        }
        
        .command-input { 
            flex-grow: 1; 
            background: transparent; 
            border: none; 
            color: #fff; 
            padding: 12px 20px; 
            outline: none; 
            font-size: 0.9rem;
            font-family: 'Rajdhani', sans-serif;
        }
        .command-input::placeholder {
            color: #555;
            letter-spacing: 1px;
        }

        .cmd-btn { 
            background: rgba(0, 217, 255, 0.1); 
            border: 1px solid var(--cyan); 
            color: var(--cyan); 
            padding: 10px 20px; 
            border-radius: 30px; 
            cursor: pointer; 
            font-weight: 600; 
            letter-spacing: 1px; 
            font-size: 0.7rem; 
            transition: all 0.3s;
            font-family: 'Rajdhani', sans-serif;
            white-space: nowrap;
        }
        .cmd-btn:hover { 
            background: var(--cyan); 
            color: #000; 
            box-shadow: 0 0 25px var(--cyan);
            transform: translateY(-2px);
        }
        .cmd-btn:active {
            transform: translateY(0);
        }
        .cmd-btn.primary {
            background: var(--cyan);
            color: #000;
        }

        /* Toggle Button */
        .panel-toggle { 
            position: fixed; 
            left: 0; 
            top: 50%; 
            transform: translateY(-50%);
            width: 35px; 
            height: 80px; 
            background: rgba(0,217,255,0.1); 
            z-index: 200; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: var(--cyan); 
            border-radius: 0 8px 8px 0; 
            border: 1px solid var(--cyan); 
            border-left: none;
            transition: all 0.3s;
            font-size: 1.2rem;
        }
        .panel-toggle:hover {
            background: rgba(0,217,255,0.2);
            width: 40px;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .left-panel { width: 85vw; bottom: 180px; }
            .right-panel { 
                right: 50%; 
                transform: translateX(50%); 
                top: auto; 
                bottom: 180px; 
                width: 85vw; 
            }
            .command-deck { width: 95%; flex-wrap: wrap; border-radius: 20px; }
            .cmd-btn { padding: 8px 15px; font-size: 0.65rem; }
            .status-bar { bottom: 130px; font-size: 0.65rem; }
        }

        /* Galaxy Labels */
        .galaxy-label {
            position: absolute;
            color: var(--cyan);
            font-size: 0.7rem;
            letter-spacing: 2px;
            pointer-events: none;
            z-index: 50;
            text-shadow: 0 0 10px var(--cyan);
            animation: floatLabel 3s infinite ease-in-out;
        }
        @keyframes floatLabel {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

<canvas id="galaxy-canvas"></canvas>

<div class="supreme-header">
    <h1>ARSLAN-ASH AI | IMPERIAL GALAXY</h1>
    <div class="subtitle">(V5.0 NEURAL GALAXY)</div>
</div>

<div class="panel-toggle" onclick="togglePanels()">❮</div>

<div class="panel left-panel" id="left-panel">
    <div class="panel-header">
        <span>HISTORY LOG (V5.0)</span>
        <div class="status-indicator">
            <div class="status-dot"></div>
            <span style="font-size: 0.6rem;">23.09.2023</span>
        </div>
    </div>
    <div id="history-log">
        <div class="log-entry">
            <span class="log-tag">SYSTEM_INIT</span>
            <div class="log-content">Neural Path Synchronized. Imperial Galaxy Online.</div>
        </div>
    </div>
</div>

<div class="panel right-panel" id="right-panel">
    <div class="panel-header">
        <span>LIVE_TELEMETRY</span>
        <div class="status-indicator">
            <div class="status-dot"></div>
        </div>
    </div>
    <div class="telemetry-container">
        <div class="telemetry-orb" onclick="activateTelemetry()">
            <div class="orb-inner"></div>
            <div class="orb-status" id="orb-status">PC View - [OK]</div>
            <img id="pc-view-img" src="" alt="">
        </div>
    </div>
</div>

<div class="status-bar">
    MASTER CORE V5.0 - OPERATIONAL | STATUS: NEURAL SYNC [OK]
</div>

<div class="command-deck">
    <input type="text" class="command-input" id="cmd-input" placeholder="Command the Core..." autocomplete="off">
    <button class="cmd-btn" onclick="zoomGalaxy(0.8)">Zoom -</button>
    <button class="cmd-btn" onclick="zoomGalaxy(1.2)">Zoom +</button>
    <button class="cmd-btn" onclick="runCommand()">RUN</button>
    <button class="cmd-btn primary" onclick="executeCommand()">EXECUTE</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    const DB_URL = "https://sh-controller-default-rtdb.firebaseio.com/";
    let scene, camera, renderer, galaxyPoints;
    let targetZoom = 1;
    let mouseX = 0, mouseY = 0;
    let isMouseMoving = false;

    // Initialize Galaxy
    function initGalaxy() {
        scene = new THREE.Scene();
        
        camera = new THREE.PerspectiveCamera(
            60, 
            window.innerWidth / window.innerHeight, 
            1, 
            5000
        );
        camera.position.set(0, 500, 1200);
        camera.lookAt(0, 0, 0);

        renderer = new THREE.WebGLRenderer({ 
            canvas: document.getElementById('galaxy-canvas'),
            antialias: true, 
            alpha: true 
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        createSpiralGalaxy();
        addAmbientParticles();
        
        animate();
    }

    // Create Realistic Spiral Galaxy
    function createSpiralGalaxy() {
        const geometry = new THREE.BufferGeometry();
        const particleCount = 25000;
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const sizes = new Float32Array(particleCount);

        for(let i = 0; i < particleCount; i++) {
            const spiralArm = i % 5; // 5 spiral arms
            const angleOffset = (spiralArm * Math.PI * 2) / 5;
            const spiralFactor = i / particleCount;
            const angle = spiralFactor * Math.PI * 20 + angleOffset;
            
            const radius = Math.pow(Math.random(), 0.6) * 900;
            const spread = (Math.random() - 0.5) * 100 * (1 - spiralFactor);
            
            // X, Y, Z coordinates
            positions[i * 3] = Math.cos(angle) * radius + spread;
            positions[i * 3 + 1] = (Math.random() - 0.5) * (100 - radius / 10);
            positions[i * 3 + 2] = Math.sin(angle) * radius + spread;

            // Colors - cyan core, white edges
            const distFromCenter = radius / 900;
            if (Math.random() > 0.7 || radius < 200) {
                // Cyan glow particles
                colors[i * 3] = 0;
                colors[i * 3 + 1] = 0.8 + Math.random() * 0.2;
                colors[i * 3 + 2] = 1;
            } else {
                // White/blue particles
                const brightness = 0.6 + Math.random() * 0.4;
                colors[i * 3] = brightness;
                colors[i * 3 + 1] = brightness;
                colors[i * 3 + 2] = 1;
            }

            sizes[i] = Math.random() * 2 + 0.5;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

        const material = new THREE.PointsMaterial({
            size: 2,
            vertexColors: true,
            transparent: true,
            opacity: 0.9,
            blending: THREE.AdditiveBlending,
            sizeAttenuation: true
        });

        galaxyPoints = new THREE.Points(geometry, material);
        scene.add(galaxyPoints);

        // Add galaxy center glow
        const glowGeometry = new THREE.SphereGeometry(50, 32, 32);
        const glowMaterial = new THREE.MeshBasicMaterial({
            color: 0x00d9ff,
            transparent: true,
            opacity: 0.3,
            blending: THREE.AdditiveBlending
        });
        const glowSphere = new THREE.Mesh(glowGeometry, glowMaterial);
        scene.add(glowSphere);
    }

    // Add background star field
    function addAmbientParticles() {
        const geometry = new THREE.BufferGeometry();
        const count = 3000;
        const positions = new Float32Array(count * 3);

        for(let i = 0; i < count; i++) {
            positions[i * 3] = (Math.random() - 0.5) * 3000;
            positions[i * 3 + 1] = (Math.random() - 0.5) * 3000;
            positions[i * 3 + 2] = (Math.random() - 0.5) * 3000;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        const material = new THREE.PointsMaterial({
            size: 1,
            color: 0xffffff,
            transparent: true,
            opacity: 0.4
        });

        const stars = new THREE.Points(geometry, material);
        scene.add(stars);
    }

    // Animation Loop
    function animate() {
        requestAnimationFrame(animate);

        // Smooth rotation
        galaxyPoints.rotation.y += 0.0008;
        
        // Mouse interaction
        if (isMouseMoving) {
            galaxyPoints.rotation.x += (mouseY * 0.0002 - galaxyPoints.rotation.x) * 0.05;
            galaxyPoints.rotation.y += (mouseX * 0.0002 - galaxyPoints.rotation.y) * 0.05;
        }

        // Zoom interpolation
        camera.position.z = THREE.MathUtils.lerp(
            camera.position.z, 
            1200 / targetZoom, 
            0.05
        );
        camera.position.y = THREE.MathUtils.lerp(
            camera.position.y,
            500 / targetZoom,
            0.05
        );

        renderer.render(scene, camera);
    }

    // Mouse Movement
    document.addEventListener('mousemove', (e) => {
        mouseX = (e.clientX - window.innerWidth / 2);
        mouseY = (e.clientY - window.innerHeight / 2);
        isMouseMoving = true;
        
        setTimeout(() => { isMouseMoving = false; }, 100);
    });

    // Touch Movement (Mobile)
    document.addEventListener('touchmove', (e) => {
        if (e.touches.length > 0) {
            mouseX = (e.touches[0].clientX - window.innerWidth / 2);
            mouseY = (e.touches[0].clientY - window.innerHeight / 2);
            isMouseMoving = true;
        }
    });

    // Zoom Function
    function zoomGalaxy(factor) {
        targetZoom *= factor;
        targetZoom = Math.max(0.5, Math.min(targetZoom, 3));
    }

    // Toggle Panels
    let panelsVisible = true;
    function togglePanels() {
        panelsVisible = !panelsVisible;
        document.getElementById('left-panel').classList.toggle('hidden');
        document.getElementById('right-panel').classList.toggle('hidden');
        document.querySelector('.panel-toggle').innerText = panelsVisible ? '❮' : '❯';
    }

    // Telemetry Activation
    function activateTelemetry() {
        const orb = document.querySelector('.telemetry-orb');
        orb.style.transform = 'scale(1.05)';
        setTimeout(() => orb.style.transform = 'scale(1)', 300);
    }

    // Command Execution
    async function executeCommand() {
        const input = document.getElementById('cmd-input');
        const cmd = input.value.trim();
        if (!cmd) return;

        const timestamp = Date.now();
        const logArea = document.getElementById('history-log');
        
        // Add user command to log
        logArea.innerHTML += `
            <div class="log-entry">
                <span class="log-tag">REQUEST</span>
                <div class="log-content">${cmd}</div>
            </div>
        `;
        input.value = "";
        logArea.scrollTop = logArea.scrollHeight;

        // Send to Firebase
        try {
            await fetch(`${DB_URL}current.json`, {
                method: "PUT",
                body: JSON.stringify({
                    cmd: cmd,
                    time: timestamp,
                    resp: "PENDING",
                    img: ""
                })
            });

            // Poll for response
            const pollInterval = setInterval(async () => {
                const response = await fetch(`${DB_URL}current.json`);
                const data = await response.json();
                
                if (data.time == timestamp && data.resp !== "PENDING") {
                    clearInterval(pollInterval);
                    
                    // Add AI response to log
                    logArea.innerHTML += `
                        <div class="log-entry">
                            <span class="log-tag">AI_ENGINE</span>
                            <div class="log-content">${data.resp}</div>
                        </div>
                    `;
                    
                    // Show image if available
                    if (data.img) {
                        document.getElementById('pc-view-img').src = data.img;
                        document.getElementById('pc-view-img').style.display = 'block';
                        document.getElementById('orb-status').style.display = 'none';
                    }
                    
                    logArea.scrollTop = logArea.scrollHeight;
                }
            }, 1000);
        } catch (error) {
            console.error('Firebase error:', error);
        }
    }

    // Run Command (shortcut)
    function runCommand() {
        executeCommand();
    }

    // Enter key to execute
    document.getElementById('cmd-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') executeCommand();
    });

    // Window Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Initialize on load
    initGalaxy();
</script>
</body>
</html>
