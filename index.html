<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASH AI - CORE INTERFACE</title>
    <style>
        :root { --neon: #00ff00; --bg: #050505; --dark: #111; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .panel { width: 500px; background: rgba(10,10,10,0.95); border: 1px solid var(--neon); border-radius: 2px; padding: 25px; box-shadow: 0 0 25px rgba(0,255,0,0.1); position: relative; }
        .panel::before { content: "MASTER CONTROL UNIT v4.0"; position: absolute; top: -12px; left: 20px; background: var(--bg); padding: 0 10px; font-size: 0.7rem; letter-spacing: 2px; }
        #output { height: 250px; background: #000; border: 1px solid #222; margin-bottom: 20px; padding: 15px; overflow-y: auto; font-size: 0.85rem; line-height: 1.5; color: #fff; border-radius: 2px; scrollbar-width: thin; }
        .ai-msg { color: var(--neon); margin-bottom: 10px; border-left: 2px solid var(--neon); padding-left: 10px; }
        .user-msg { color: #888; margin-bottom: 10px; text-align: right; font-style: italic; }
        input { width: 100%; background: #000; border: 1px solid #444; color: var(--neon); padding: 15px; box-sizing: border-box; outline: none; margin-bottom: 15px; font-size: 1rem; transition: 0.3s; }
        input:focus { border-color: var(--neon); box-shadow: 0 0 10px rgba(0,255,0,0.2); }
        button { width: 100%; background: var(--neon); color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        button:hover { background: #fff; box-shadow: 0 0 20px var(--neon); }
        .loader { height: 2px; width: 0%; background: var(--neon); transition: 0.4s; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="panel">
    <div id="output">
        <div class="ai-msg">ASH AI: Awaiting Neural Link... Master Arslan, I am ready.</div>
    </div>
    <div id="load-bar" class="loader"></div>
    <input type="text" id="cmdInput" placeholder="Command or Question..." autocomplete="off">
    <button id="execBtn" onclick="sendOrder()">Execute Link</button>
</div>

<script>
    const DB_URL = "https://sh-controller-default-rtdb.firebaseio.com/.json";

    async function sendOrder() {
        const input = document.getElementById('cmdInput');
        const order = input.value.trim();
        const output = document.getElementById('output');
        const loadBar = document.getElementById('load-bar');

        if(!order) return;

        // UI Action
        output.innerHTML += `<div class="user-msg">> ${order}</div>`;
        loadBar.style.width = "100%";
        input.value = "";
        output.scrollTop = output.scrollHeight;

        try {
            await fetch(DB_URL, {
                method: "PUT",
                body: JSON.stringify({ command: order, time: Date.now(), response: "processing..." })
            });

            // Start Polling for AI Response
            let checkCount = 0;
            const poll = setInterval(async () => {
                const res = await fetch(DB_URL);
                const data = await res.json();
                if(data.response && data.response !== "processing...") {
                    output.innerHTML += `<div class="ai-msg">ASH: ${data.response}</div>`;
                    output.scrollTop = output.scrollHeight;
                    loadBar.style.width = "0%";
                    clearInterval(poll);
                }
                if(checkCount++ > 20) clearInterval(poll); // Timeout after 20s
            }, 1000);

        } catch (e) {
            output.innerHTML += `<div style="color:red">!! LINK ERROR: ${e.message}</div>`;
        }
    }

    document.getElementById("cmdInput").addEventListener("keyup", (e) => { if (e.key === "Enter") sendOrder(); });
</script>

</body>
</html>
