<style>
    /* Fix for image visibility */
    #pc-view-img {
        width: 100%; height: 100%; object-fit: cover;
        display: none; position: absolute; top: 0; left: 0;
        z-index: 5; /* Orb layers ke upar rahega */
        border-radius: 50%;
    }
</style>

<script>
    // FIX 1: Make sure this URL is EXACTLY what's in your Firebase Console
    const DB_URL = "https://sh-controller-default-rtdb.firebaseio.com/"; 

    // FIX 2: Added a 'Response Clearer' taake purani commands loop na karein
    async function executeCommand() {
        const input = document.getElementById('cmd-input');
        const cmd = input.value.trim();
        if (!cmd) return;

        const timestamp = Date.now();
        const logArea = document.getElementById('history-log');
        
        logArea.innerHTML += `
            <div class="log-entry">
                <span class="log-tag">REQUEST</span>
                <div class="log-content">${cmd}</div>
            </div>
        `;
        input.value = "";
        logArea.scrollTop = logArea.scrollHeight;

        try {
            // Sending command to Firebase
            await fetch(`${DB_URL}current.json`, {
                method: "PUT",
                body: JSON.stringify({
                    cmd: cmd,
                    time: timestamp,
                    resp: "PENDING",
                    img: ""
                })
            });

            let attempts = 0;
            const pollInterval = setInterval(async () => {
                attempts++;
                const response = await fetch(`${DB_URL}current.json`);
                const data = await response.json();
                
                if (data && data.time == timestamp && data.resp !== "PENDING") {
                    clearInterval(pollInterval);
                    
                    logArea.innerHTML += `
                        <div class="log-entry">
                            <span class="log-tag">AI_ENGINE</span>
                            <div class="log-content">${data.resp}</div>
                        </div>
                    `;
                    
                    if (data.img) {
                        const imgEl = document.getElementById('pc-view-img');
                        imgEl.src = data.img;
                        imgEl.style.display = 'block';
                        document.getElementById('orb-status').style.display = 'none';
                    }
                    logArea.scrollTop = logArea.scrollHeight;
                }
                
                // Timeout after 30 seconds if AI doesn't respond
                if (attempts > 30) {
                    clearInterval(pollInterval);
                    console.log("System Timeout: AI Worker not responding.");
                }
            }, 1000);
        } catch (error) {
            console.error('Connection Failed:', error);
        }
    }
</script>
