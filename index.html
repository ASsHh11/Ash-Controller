<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {

            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }
        .container { 
            border: 2px solid #0f0; 
            padding: 30px; 
            box-shadow: 0 0 25px #0f0;

            width: 90%;

            background: #111;

            color: #0f0;

            box-sizing: border-box; 
            font-size: 1.1em;
            border-radius: 5px;
        }
        button {

            padding: 15px; 
            background: #0f0; 
            color: #000; 
            border: none;
