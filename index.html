<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ash AI Master - FIREBASE SPEED</title>
    <style>
        body { background: #0a0a0a; color: #00ff00; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { width: 400px; background: #111; padding: 30px; border: 2px solid #00ff00; border-radius: 15px; text-align: center; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
        h2 { margin-bottom: 20px; letter-spacing: 3px; text-transform: uppercase; font-size: 1.4rem; color: #00ff00; text-shadow: 0 0 10px #00ff00; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #1a1a1a; color: #0f0; outline: none; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; background: #00ff00; color: #000; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: #00cc00; box-shadow: 0 0 15px #00ff00; }
        #status { font-size: 0.8rem; color: #888; margin-top: 10px; }
        .success { color: #00ff00 !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>ASH COMMANDER</h2>
    <div id="status">System Status: Online</div>
    <input type="text" id="cmdInput" placeholder="Order (e.g. open notepad and type hi)">
    <button id="execBtn" onclick="sendOrder()">EXECUTE INSTANTLY</button>
</div>

<script>
    // --- FIREBASE CONFIGURATION ---
    // Aapka Firebase URL jo aapne copy kiya tha
    const DB_URL = "https://sh-controller-default-rtdb.firebaseio.com/.json"; 

    async function sendOrder() {
        const input = document.getElementById('cmdInput');
        const order = input.value.trim();
        const status = document.getElementById('status');
        const btn = document.getElementById('execBtn');

        if(!order) return;

        // UI Feedback
        status.innerText = "Transmitting to Firebase...";
        status.className = "";
        btn.disabled = true;
        btn.style.opacity = "0.5";

        try {
            // Firebase ko direct data bhej rahe hain bina kisi token ke
            const response = await fetch(DB_URL, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    command: order, 
                    time: Date.now() // Unique time taake PC ko pata chale naya order hai
                })
            });

            if(response.ok) {
                status.innerText = "Order Synced Successfully!";
                status.className = "success";
                input.value = ""; // Input clear karein
            } else {
                throw new Error("Firebase rejected the update");
            }

        } catch(e) {
            console.error(e);
            status.innerText = "Connection Error!";
            status.style.color = "red";
        } finally {
            btn.disabled = false;
            btn.style.opacity = "1";
            // 3 second baad status normal karein
            setTimeout(() => {
                if(status.className === "success") {
                    status.innerText = "System Status: Online";
                    status.className = "";
                }
            }, 3000);
        }
    }

    // Enter key support
    document.getElementById("cmdInput").addEventListener("keyup", function(event) {
        if (event.key === "Enter") {
            sendOrder();
        }
    });
</script>

</body>
</html>
