<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arslan-Ash AI</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #0a0a0a; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--neon); font-family: 'Segoe UI', monospace; overflow: hidden; height: 100%; }
        #canvas { position: absolute; top: 0; left: 0; z-index: -1; }
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; transition: 0.5s; }
        .terminal-box { border: 2px solid var(--neon); padding: 30px; box-shadow: 0 0 20px var(--neon); border-radius: 10px; background: rgba(0,0,0,0.9); width: 90%; max-width: 500px; text-align: center; }
        input { width: 80%; padding: 12px; background: #000; border: 1px solid var(--neon); color: var(--neon); margin: 10px 0; outline: none; font-size: 1.2em; text-align: center; }
        button { padding: 12px 30px; background: var(--neon); color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        button:hover { box-shadow: 0 0 30px var(--neon); transform: scale(1.05); }
        #main-ui { display: none; flex-direction: column; height: 100vh; padding: 20px; box-sizing: border-box; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 10px; border: 1px solid #1a1a1a; margin-bottom: 20px; border-radius: 5px; scroll-behavior: smooth; }
        .msg { margin: 10px 0; padding: 10px; border-radius: 5px; max-width: 80%; }
        .user { border-left: 3px solid #fff; align-self: flex-end; background: #111; }
        .ai { border-left: 3px solid var(--neon); background: #051a05; }
        .input-area { display: flex; gap: 10px; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div id="auth-overlay">
        <div class="terminal-box">
            <h2>ACCESS RESTRICTED</h2>
            <input type="password" id="passInput" placeholder="ENTER SYSTEM KEY...">
            <button onclick="verify()">LOGIN</button>
        </div>
    </div>

    <div id="main-ui">
        <h1 style="text-align: center; letter-spacing: 5px; font-size: 1.5em;">ARSLAN-ASH AI</h1>
        <div id="chat-flow"></div>
        <div class="input-area">
            <input type="text" id="userMsg" placeholder="Command the core..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()">SEND</button>
        </div>
    </div>

    <script>
        const pass = "MyHome@123"; // Change your password here
        function verify() {
            if(document.getElementById('passInput').value === pass) {
                document.getElementById('auth-overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('auth-overlay').style.display = 'none';
                    document.getElementById('main-ui').style.display = 'flex';
                }, 500);
            } else { alert("ACCESS DENIED"); }
        }

        // Futuristic Background Animation
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('mousemove', (e) => {
            for(let i=0; i<3; i++) particles.push({ x: e.x, y: e.y, size: Math.random()*3, speedX: Math.random()*3-1.5, speedY: Math.random()*3-1.5, color: '#00ff41' });
        });

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.x += p.speedX; p.y += p.speedY; p.size -= 0.05;
                if(p.size <= 0) particles.splice(i, 1);
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        animate();

        async function send() {
            const input = document.getElementById('userMsg');
            const flow = document.getElementById('chat-flow');
            if(!input.value) return;

            const cmd = input.value;
            flow.innerHTML += `<div class="msg user">${cmd}</div>`;
            input.value = "";
            flow.scrollTop = flow.scrollHeight;

            try {
                const response = await fetch("https://b691-39-50-229-101.ngrok-free.app/ollama/api/chat", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: "gemma2-2b-local:latest", messages: [{role: "user", content: cmd}], stream: false })
                });
                const data = await response.json();
                flow.innerHTML += `<div class="msg ai">${data.message.content}</div>`;
                confetti({ particleCount: 50, spread: 60, origin: { y: 0.9 }, colors: ['#00ff41'] });
            } catch(e) { flow.innerHTML += `<div class="msg ai" style="color:red">Link Offline. Check PC Core.</div>`; }
            flow.scrollTop = flow.scrollHeight;
        }
    </script>
</body>
</html>
