<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARSLAN-ASH AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --cyan: #00d9ff; 
            --glass: rgba(0, 10, 20, 0.85); 
            --border: rgba(0, 217, 255, 0.2);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            height: 100%; width: 100%; overflow: hidden; 
            background: #000; font-family: 'Rajdhani', sans-serif; color: #fff;
        }

        #galaxy-canvas { position: absolute; inset: 0; z-index: 1; }

        /* Minimalist Header */
        .supreme-header { 
            position: fixed; top: 0; width: 100%; height: 70px; 
            z-index: 100; text-align: center; padding-top: 20px;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%); 
        }
        .supreme-header h1 { 
            font-family: 'Orbitron', sans-serif; 
            font-size: clamp(1.2rem, 5vw, 1.8rem);
            letter-spacing: 5px; color: var(--cyan); 
            text-shadow: 0 0 20px var(--cyan);
        }

        /* Compact Adaptive Panels */
        .panel { 
            position: fixed; background: var(--glass); backdrop-filter: blur(25px); 
            border: 1px solid var(--border); border-radius: 12px; z-index: 150;
            padding: 15px; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
        }
        .panel.hidden { opacity: 0; transform: translateX(-20px) scale(0.95); pointer-events: none; }

        .left-panel { left: 15px; top: 90px; bottom: 120px; width: min(350px, 90vw); display: flex; flex-direction: column; }
        .right-panel { right: 15px; top: 90px; width: min(280px, 90vw); }

        .panel-header { font-size: 0.7rem; color: var(--cyan); letter-spacing: 2px; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 5px; }

        #history-log { flex-grow: 1; overflow-y: auto; scrollbar-width: none; font-size: 0.85rem; }
        #history-log::-webkit-scrollbar { display: none; }
        .log-entry { margin-bottom: 12px; border-left: 2px solid var(--cyan); padding-left: 10px; animation: fadeIn 0.4s forwards; }
        .log-tag { font-size: 0.6rem; color: var(--cyan); opacity: 0.7; }

        /* Mobile-Friendly Telemetry */
        .telemetry-orb { 
            width: 100%; height: 180px; background: #000; border: 2px solid var(--cyan); 
            border-radius: 50%; position: relative; overflow: hidden;
            box-shadow: 0 0 20px rgba(0,217,255,0.2); display: flex; align-items: center; justify-content: center;
        }
        #pc-view-img { width: 100%; height: 100%; object-fit: cover; display: none; z-index: 5; border-radius: 50%; }

        /* Compact Toggle Button */
        .panel-toggle { 
            position: fixed; left: 0; top: 15px; width: 30px; height: 40px; 
            background: var(--glass); z-index: 300; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; 
            color: var(--cyan); border-radius: 0 5px 5px 0; border: 1px solid var(--cyan); 
            font-size: 1rem;
        }

        /* Command Deck Adaptive */
        .command-deck { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            width: 95%; max-width: 800px; z-index: 200;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 40px;
            display: flex; padding: 5px 15px; gap: 8px;
        }
        .command-input { flex-grow: 1; background: transparent; border: none; color: #fff; padding: 10px; outline: none; font-size: 0.95rem; width: 50%; }
        .cmd-btn { background: transparent; border: 1px solid var(--cyan); color: var(--cyan); padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 0.75rem; font-weight: 600; transition: 0.3s; white-space: nowrap; }
        .cmd-btn.primary { background: var(--cyan); color: #000; }
        
        @media (max-width: 768px) {
            .left-panel { bottom: 100px; height: 40vh; }
            .right-panel { top: auto; bottom: 100px; height: auto; }
            .command-deck { padding: 5px 10px; }
            .cmd-btn { padding: 8px 12px; font-size: 0.65rem; }
        }
    </style>
</head>
<body>

<canvas id="galaxy-canvas"></canvas>

<div class="supreme-header">
    <h1>ARSLAN-ASH AI</h1>
</div>

<div class="panel-toggle" onclick="togglePanels()">❮</div>

<div class="panel left-panel" id="left-panel">
    <div class="panel-header">HISTORY LOG</div>
    <div id="history-log">
        <div class="log-entry"><span class="log-tag">SYSTEM</span><div class="log-content">Neural Link Ready.</div></div>
    </div>
</div>

<div class="panel right-panel" id="right-panel">
    <div class="panel-header">TELEMETRY</div>
    <div class="telemetry-orb">
        <div id="orb-status" style="color:var(--cyan); font-size:0.7rem; letter-spacing:2px;">PC View - [OK]</div>
        <img id="pc-view-img" src="">
    </div>
</div>

<div class="command-deck">
    <input type="text" class="command-input" id="cmd-input" placeholder="Execute Intent..." autocomplete="off">
    <button class="cmd-btn" onclick="executeCommand('RUN')">RUN</button>
    <button class="cmd-btn primary" onclick="executeCommand('EXECUTE')">EXECUTE</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    const DB_URL = "https://sh-controller-default-rtdb.firebaseio.com/";
    let scene, camera, renderer, galaxy;
    let targetZoom = 1;

    function initGalaxy() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 5000);
        camera.position.set(0, 400, 1100);
        
        renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('galaxy-canvas'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        const geometry = new THREE.BufferGeometry();
        const particles = 20000;
        const pos = new Float32Array(particles * 3);
        const cols = new Float32Array(particles * 3);

        for(let i=0; i<particles; i++) {
            const angle = (i / particles) * Math.PI * 25;
            const radius = Math.pow(Math.random(), 0.7) * 800;
            pos[i*3] = Math.cos(angle) * radius + (Math.random()-0.5)*50;
            pos[i*3+1] = (Math.random()-0.5)*30;
            pos[i*3+2] = Math.sin(angle) * radius + (Math.random()-0.5)*50;
            cols[i*3] = 0; cols[i*3+1] = 0.8; cols[i*3+2] = 1;
        }
        geometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(cols, 3));
        
        galaxy = new THREE.Points(geometry, new THREE.PointsMaterial({ size: 2, vertexColors: true, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending }));
        scene.add(galaxy);
        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        galaxy.rotation.y += 0.0006;
        camera.position.z = THREE.MathUtils.lerp(camera.position.z, 1100 / targetZoom, 0.05);
        renderer.render(scene, camera);
    }

    function togglePanels() {
        const lp = document.getElementById('left-panel');
        const rp = document.getElementById('right-panel');
        lp.classList.toggle('hidden');
        rp.classList.toggle('hidden');
        document.querySelector('.panel-toggle').innerText = lp.classList.contains('hidden') ? '❯' : '❮';
    }

    async function executeCommand(type) {
        const input = document.getElementById('cmd-input');
        const cmd = input.value.trim();
        if(!cmd) return;
        const ts = Date.now();
        const log = document.getElementById('history-log');
        
        log.innerHTML += `<div class="log-entry"><span class="log-tag">${type}</span><div>${cmd}</div></div>`;
        input.value = "";
        log.scrollTop = log.scrollHeight;

        try {
            await fetch(`${DB_URL}current.json`, {
                method: "PUT",
                body: JSON.stringify({ cmd: cmd, time: ts, resp: "PENDING", img: "" })
            });

            let checks = 0;
            const poller = setInterval(async () => {
                checks++;
                const res = await fetch(`${DB_URL}current.json`);
                const data = await res.json();
                if(data.time == ts && data.resp !== "PENDING") {
                    clearInterval(poller);
                    log.innerHTML += `<div class="log-entry"><span class="log-tag">AI</span><div>${data.resp}</div></div>`;
                    if(data.img) {
                        const img = document.getElementById('pc-view-img');
                        img.src = data.img; img.style.display = 'block';
                        document.getElementById('orb-status').style.display = 'none';
                    }
                    log.scrollTop = log.scrollHeight;
                }
                if(checks > 30) clearInterval(poller);
            }, 1000);
        } catch(e) { console.error(e); }
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    initGalaxy();
</script>
</body>
</html>
