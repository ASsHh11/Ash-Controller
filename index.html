<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ASH AI - MASTER CONTROL</title>
    <style>
        :root { --neon: #00ff00; --bg: #050505; }
        body { background: var(--bg); color: var(--neon); font-family: 'Segoe UI', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .panel { width: 450px; background: rgba(15,15,15,0.9); border: 1px solid var(--neon); border-radius: 5px; padding: 20px; box-shadow: 0 0 20px rgba(0,255,0,0.1); position: relative; }
        .panel::before { content: "SYSTEM ACTIVE"; position: absolute; top: -10px; left: 20px; background: var(--bg); padding: 0 10px; font-size: 0.7rem; }
        #output { height: 200px; background: #000; border: 1px solid #222; margin-bottom: 15px; padding: 10px; overflow-y: auto; font-size: 0.85rem; color: #fff; border-radius: 3px; }
        .ai-msg { color: var(--neon); margin-bottom: 8px; }
        .user-msg { color: #888; margin-bottom: 8px; font-style: italic; }
        input { width: 100%; background: #111; border: 1px solid #333; color: var(--neon); padding: 12px; box-sizing: border-box; outline: none; margin-bottom: 10px; }
        button { width: 100%; background: var(--neon); color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: #fff; box-shadow: 0 0 15px var(--neon); }
        .loader { height: 2px; width: 0%; background: var(--neon); transition: 0.5s; }
    </style>
</head>
<body>
<div class="panel">
    <h2>ASH AI ENGINE</h2>
    <div id="output">--- Initializing Neural Link ---<br>Ready for Master Arslan...</div>
    <div id="load-bar" class="loader"></div>
    <input type="text" id="cmdInput" placeholder="Ask anything or give a command...">
    <button onclick="sendOrder()">Submit Order</button>
</div>

<script>
    const DB_URL = "https://sh-controller-default-rtdb.firebaseio.com/.json";

    async function sendOrder() {
        const input = document.getElementById('cmdInput');
        const order = input.value.trim();
        if(!order) return;

        document.getElementById('load-bar').style.width = "100%";
        document.getElementById('output').innerHTML += `<div class="user-msg">> ${order}</div>`;

        try {
            await fetch(DB_URL, {
                method: "PUT",
                body: JSON.stringify({ command: order, time: Date.now() })
            });
            input.value = "";
            setTimeout(() => { document.getElementById('load-bar').style.width = "0%"; }, 1000);
            
            // Check for AI Response after 5s
            setTimeout(getAIResponse, 5000);
        } catch (e) { alert("Link Error"); }
    }

    async function getAIResponse() {
        const res = await fetch(DB_URL);
        const data = await res.json();
        if(data.response) {
            document.getElementById('output').innerHTML += `<div class="ai-msg">ASH: ${data.response}</div>`;
            document.getElementById('output').scrollTop = document.getElementById('output').scrollHeight;
        }
    }
</script>
</body>
</html>
