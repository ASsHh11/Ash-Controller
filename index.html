<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARSLAN-ASH AI | Master Console v3.1</title>
    <style>
        body { 
            background: #000; 
            color: #0f0; 
            font-family: 'Courier New', monospace; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            border: 2px solid #0f0; 
            padding: 30px; 
            box-shadow: 0 0 25px #0f0; 
            border-radius: 15px; 
            width: 90%; 
            max-width: 600px; 
            background: rgba(0, 10, 0, 0.9);
        }
        h2 { text-align: center; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 25px; }
        input { 
            width: 100%; 
            padding: 15px; 
            background: #111; 
            border: 1px solid #0f0; 
            color: #0f0; 
            outline: none; 
            box-sizing: border-box; 
            font-size: 1.1em;
            margin-bottom: 15px;
        }
        button { 
            width: 100%; 
            padding: 15px; 
            background: #0f0; 
            color: #000; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 1.1em;
            transition: 0.3s;
        }
        button:hover { background: #0c0; box-shadow: 0 0 20px #0f0; }
        #response-box { 
            margin-top: 20px; 
            border: 1px solid #333; 
            padding: 15px; 
            height: 200px; 
            overflow-y: auto; 
            background: #050505; 
            color: #fff;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>ASH-AI MASTER CONSOLE</h2>
    <input type="text" id="cmdInput" placeholder="Hukam dein, Arslan bhai...">
    <button onclick="executeCommand()">EXECUTE COMMAND</button>
    <div id="response-box">[SYSTEM]: Connected to Tunnel. Ready for Gemma-2...</div>
</div>

<script>
    async function executeCommand() {
        const cmd = document.getElementById("cmdInput").value;
        const resBox = document.getElementById("response-box");

        // --- FIXED NGROK URL & ENDPOINT ---
        const NGROK_URL = "https://b691-39-50-229-101.ngrok-free.app/v1/chat/completions"; 

        if (!cmd) return alert("Kuch likho toh sahi!");

        resBox.innerText = "[TRANSMITTING]: Sending to Portable AI (HDD)...";

        try {
            const response = await fetch(NGROK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "gemma2-2b-local:latest", 
                    messages: [{ role: "user", content: cmd }],
                    stream: false
                })
            });

            const data = await response.json();
            
            // Format response according to your Portable AI structure
            if (data.choices && data.choices[0].message) {
                resBox.innerText = "[GEMMA-2]: " + data.choices[0].message.content;
            } else {
                resBox.innerText = "[ERROR]: Unexpected response format.";
            }

        } catch (err) {
            resBox.innerText = "[CRITICAL ERROR]: Connection failed. 1. Check Ngrok CMD. 2. Check Portable AI CMD.";
        }
    }
</script>

</body>
</html>
