<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ash AI Master - SECURE PANEL</title>
    <style>
        body { background: #0a0a0a; color: #00ff00; font-family: 'Segoe UI', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { width: 400px; background: #111; padding: 30px; border: 2px solid #00ff00; border-radius: 15px; box-shadow: 0 0 30px rgba(0,255,0,0.1); }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; }
        input { background: #1a1a1a; color: #0f0; outline: none; }
        button { background: #00ff00; color: #000; font-weight: bold; cursor: pointer; border: none; }
        #chat-box { height: 150px; background: #000; padding: 10px; overflow-y: auto; font-size: 0.8rem; border: 1px solid #222; margin-bottom: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container" id="login-screen">
    <h2 style="text-align: center;">SECURE LOGIN</h2>
    <input type="password" id="pass-input" placeholder="Enter Admin Password">
    <button onclick="checkPass()">UNLOCK ACCESS</button>
</div>

<div class="container hidden" id="main-panel">
    <h2 style="text-align: center;">ASH COMMANDER</h2>
    <div id="chat-box">--- Secure Connection Established ---</div>
    <input type="text" id="cmdInput" placeholder="Command (e.g. Open Chrome)">
    <button onclick="sendOrder()">EXECUTE ORDER</button>
    <p id="status" style="font-size: 0.7rem; text-align: center; color: #888;">Status: Waiting...</p>
</div>

<script>
    // --- SECURITY CONFIG ---
    const MY_PASS = "MyHome@123"; // <--- Yahan APNA PASS likhein
    const TOKEN = "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"; // <--- Yahan Token dalein
    const OWNER = "ASsHh11";
    const REPO = "Ash-Controller";
    const FILE = "command.txt";

    function checkPass() {
        const p = document.getElementById('pass-input').value;
        if(p === MY_PASS) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-panel').classList.remove('hidden');
        } else {
            alert("Wrong Password! Access Denied.");
        }
    }

    async function sendOrder() {
        const input = document.getElementById('cmdInput');
        const order = input.value;
        const status = document.getElementById('status');
        const chat = document.getElementById('chat-box');

        if(!order) return;
        status.innerText = "Transmitting...";

        try {
            // Fetch SHA
            const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`, {
                headers: { "Authorization": `token ${TOKEN}` }
            });
            const data = await res.json();
            
            // Push Update
            const up = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`, {
                method: "PUT",
                headers: { "Authorization": `token ${TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: "Secure Execution",
                    content: btoa(order),
                    sha: data.sha
                })
            });

            if(up.ok) {
                chat.innerHTML += `<div>[${new Date().toLocaleTimeString()}] Sent: ${order}</div>`;
                status.innerText = "Status: Executed on PC";
                input.value = "";
            }
        } catch(e) {
            status.innerText = "Error! Connection Failed.";
        }
        chat.scrollTop = chat.scrollHeight;
    }
</script>
</body>
</html>
