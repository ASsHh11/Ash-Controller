<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARSLAN-ASH AI | SUPREME COCKPIT</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00f2ff; --glass: rgba(0, 15, 25, 0.5); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; overflow: hidden; background: #000; font-family: 'Montserrat', sans-serif; }

        #galaxy-host { position: absolute; inset: 0; z-index: 1; }

        /* Arslan-Ash AI Header */
        .top-deck { position: fixed; top: 0; width: 100%; height: 80px; background: linear-gradient(to bottom, #000, transparent); z-index: 100; text-align: center; padding-top: 25px; }
        .top-deck h1 { font-family: 'Cinzel', serif; font-size: 1.8rem; letter-spacing: 12px; color: var(--cyan); text-shadow: 0 0 20px var(--cyan); }

        /* Liquid Glass Panels */
        .panel { 
            position: fixed; background: var(--glass); backdrop-filter: blur(25px); 
            border: 1px solid rgba(0, 242, 255, 0.15); border-radius: 15px; z-index: 150;
            padding: 20px; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 40px rgba(0,0,0,1);
        }
        .panel.hidden { transform: scale(0.8) opacity(0); pointer-events: none; visibility: hidden; }

        .l-side { left: 20px; top: 100px; bottom: 140px; width: 380px; display: flex; flex-direction: column; }
        .r-side { right: 20px; top: 100px; width: 320px; text-align: center; }

        /* PC Telemetry Orb */
        .telemetry-orb { 
            width: 100%; height: 220px; background: #000; border: 1px solid var(--cyan); 
            border-radius: 50%; overflow: hidden; position: relative; margin: 15px 0;
            box-shadow: inset 0 0 30px rgba(0, 242, 255, 0.2);
        }
        #pc-stream { width: 100%; height: 100%; object-fit: cover; display: none; }
        
        #log-area { flex-grow: 1; overflow-y: auto; scrollbar-width: none; font-size: 0.85rem; color: #fff; margin-top: 15px; }
        .log-msg { margin-bottom: 12px; border-left: 2px solid var(--cyan); padding-left: 15px; line-height: 1.6; }
        .tag { font-size: 0.6rem; color: var(--cyan); letter-spacing: 3px; display: block; margin-bottom: 5px; }

        /* Bottom Control Deck */
        .control-deck { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 1000px; z-index: 100;
            background: rgba(255,255,255,0.03); backdrop-filter: blur(30px);
            border: 1px solid rgba(0, 242, 255, 0.2); border-radius: 50px;
            display: flex; padding: 10px; gap: 15px;
        }
        input { flex-grow: 1; background: transparent; border: none; color: #fff; padding-left: 25px; outline: none; font-size: 1rem; }
        .btn-link { 
            background: rgba(0, 242, 255, 0.1); border: 1px solid var(--cyan); color: var(--cyan); 
            padding: 10px 30px; border-radius: 40px; cursor: pointer; font-weight: bold; 
            letter-spacing: 2px; font-size: 0.75rem; transition: 0.3s;
        }
        .btn-link:hover { background: var(--cyan); color: #000; box-shadow: 0 0 30px var(--cyan); }

        /* Toggle Arrow */
        .toggle-arrow { position: fixed; left: 0; top: 50%; width: 40px; height: 100px; background: rgba(0,242,255,0.1); z-index: 200; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--cyan); border-radius: 0 10px 10px 0; border: 1px solid var(--cyan); }
    </style>
</head>
<body>

<div id="galaxy-host"></div>

<div class="top-deck"><h1>ARSLAN-ASH AI</h1></div>

<div class="toggle-arrow" onclick="toggleUI()">❮</div>

<div class="panel l-side" id="p-left">
    <span class="tag">NEURAL_MAP_HISTORY</span>
    <div id="log-area"><div class="log-msg">Neural Path Synchronized. Imperial Galaxy Online.</div></div>
</div>

<div class="panel r-side" id="p-right">
    <span class="tag">PC_TELEMETRY</span>
    <div class="telemetry-orb">
        <img id="pc-stream" src="">
        <div id="idle" style="display:flex; height:100%; align-items:center; justify-content:center; color:#222; font-size:0.6rem; letter-spacing:5px;">LINK_READY</div>
    </div>
</div>

<div class="control-deck">
    <input type="text" id="cmd-input" placeholder="Execute System Link..." autocomplete="off">
    <button class="btn-link" onclick="zoom(0.8)">ZOOM -</button>
    <button class="btn-link" onclick="zoom(1.2)">ZOOM +</button>
    <button class="btn-link" style="background:var(--cyan); color:#000;" onclick="execute()">EXECUTE</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    const DB = "https://sh-controller-default-rtdb.firebaseio.com/";
    let scene, camera, renderer, galaxy;
    let targetZoom = 1;

    function initGalaxy() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 5000);
        camera.position.set(0, 400, 1000); // 3D Angle

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('galaxy-host').appendChild(renderer.domElement);

        // Real Spiral Geometry
        const geo = new THREE.BufferGeometry();
        const count = 18000;
        const positions = new Float32Array(count * 3);
        const colors = new Float32Array(count * 3);

        for(let i=0; i<count; i++) {
            let arm = i % 4; // 4 Arm Spiral
            let angle = (i / count) * Math.PI * 15 + (arm * (Math.PI * 2 / 4));
            let dist = Math.pow(Math.random(), 0.5) * 800;
            
            // X, Y, Z for depth
            positions[i*3] = Math.cos(angle) * dist + (Math.random()-0.5)*70;
            positions[i*3+1] = (Math.random()-0.5) * (dist/10 + 20); // Height variation
            positions[i*3+2] = Math.sin(angle) * dist + (Math.random()-0.5)*70;

            let c = new THREE.Color(i % 15 === 0 ? 0x00f2ff : 0xffffff);
            colors[i*3] = c.r; colors[i*3+1] = c.g; colors[i*3+2] = c.b;
        }

        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        
        const mat = new THREE.PointsMaterial({ size: 1.5, vertexColors: true, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending });
        galaxy = new THREE.Points(geo, mat);
        scene.add(galaxy);
    }

    function animate() {
        requestAnimationFrame(animate);
        galaxy.rotation.y += 0.001; 
        camera.position.z = THREE.MathUtils.lerp(camera.position.z, 1000 / targetZoom, 0.05);
        renderer.render(scene, camera);
    }

    function zoom(amt) { targetZoom *= amt; targetZoom = Math.min(Math.max(0.5, targetZoom), 10); }

    function toggleUI() {
        const panels = [document.getElementById('p-left'), document.getElementById('p-right')];
        panels.forEach(p => p.classList.toggle('hidden'));
        document.querySelector('.toggle-arrow').innerText = panels[0].classList.contains('hidden') ? '❯' : '❮';
    }

    async function execute() {
        const inp = document.getElementById('cmd-input');
        const val = inp.value.trim(); if(!val) return;
        const ts = Date.now();
        const log = document.getElementById('log-area');
        log.innerHTML += `<div class="log-msg"><span class="tag">REQUEST</span>${val}</div>`;
        inp.value = "";
        
        await fetch(`${DB}current.json`, { method: "PUT", body: JSON.stringify({ cmd: val, time: ts, resp: "PENDING", img: "" }) });
        
        const poll = setInterval(async () => {
            const r = await fetch(`${DB}current.json`).then(d => d.json());
            if(r.time == ts && r.resp !== "PENDING") {
                log.innerHTML += `<div class="log-msg"><span class="tag" style="color:#fff">AI_ENGINE</span>${r.resp}</div>`;
                if(r.img) {
                    const orb = document.getElementById('pc-stream');
                    orb.src = r.img; orb.style.display = 'block';
                    document.getElementById('idle').style.display = 'none';
                }
                log.scrollTop = 99999;
                clearInterval(poll);
            }
        }, 1000);
    }

    initGalaxy(); animate();
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
