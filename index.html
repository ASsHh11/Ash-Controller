<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arslan-Ash AI</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; overflow: hidden; height: 100%; }
        #canvas { position: absolute; top: 0; left: 0; z-index: -1; pointer-events: none; }
        
        /* Password Screen */
        #auth-overlay { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .terminal-box { border: 2px solid var(--neon); padding: 40px; box-shadow: 0 0 30px var(--neon); border-radius: 5px; background: rgba(0,10,0,0.95); width: 85%; max-width: 400px; text-align: center; }
        
        /* Main UI */
        #main-ui { display: none; flex-direction: column; height: 100vh; max-width: 800px; margin: 0 auto; padding: 20px; box-sizing: border-box; opacity: 0; transition: 1s; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 15px; border-bottom: 1px solid #1a1a1a; scroll-behavior: smooth; margin-bottom: 10px; }
        
        /* Elements */
        input { width: 100%; padding: 15px; background: #000; border: 1px solid var(--neon); color: var(--neon); margin: 10px 0; outline: none; font-size: 1em; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--neon); color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        button:hover { box-shadow: 0 0 20px var(--neon); transform: translateY(-2px); }
        
        /* Chat Bubbles */
        .msg { margin: 15px 0; padding: 12px; border-radius: 4px; line-height: 1.4; position: relative; animation: fadeIn 0.3s ease; }
        .user { background: rgba(255,255,255,0.05); border-right: 3px solid #fff; margin-left: 20%; text-align: right; }
        .ai { background: rgba(0,255,65,0.05); border-left: 3px solid var(--neon); margin-right: 20%; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Mobile Tweaks */
        @media (max-width: 600px) { .msg { max-width: 90%; margin-left: 0; margin-right: 0; } .terminal-box { padding: 20px; } }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div id="auth-overlay">
        <div class="terminal-box">
            <h1 style="letter-spacing: 5px;">CORE ACCESS</h1>
            <p style="font-size: 0.8em; color: #555;">ENCRYPTED BIOMETRIC REQUIRED</p>
            <input type="password" id="passInput" placeholder="ENTER SYSTEM KEY..." autofocus>
            <button onclick="verify()">AUTHORIZE</button>
        </div>
    </div>

    <div id="main-ui">
        <h2 style="text-align: center; letter-spacing: 8px; margin: 0 0 20px 0; font-size: 1.2em;">ARSLAN-ASH AI</h2>
        <div id="chat-flow">
            <div class="msg ai">Neural Link Established. System Time: <span id="sys-time"></span><br>Full PC Access: ENABLED.</div>
        </div>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="userMsg" placeholder="Command the Core..." autocomplete="off">
            <button style="width: 80px;" onclick="send()">GO</button>
        </div>
    </div>

    <script>
        const MASTER_KEY = "MyHome@123"; 
        const NGROK_ENDPOINT = "https://f3a0-39-50-229-101.ngrok-free.app/ollama/api/chat";

        function verify() {
            if(document.getElementById('passInput').value === MASTER_KEY) {
                const overlay = document.getElementById('auth-overlay');
                const ui = document.getElementById('main-ui');
                overlay.style.transform = "scale(1.5)";
                overlay.style.opacity = "0";
                setTimeout(() => {
                    overlay.style.display = "none";
                    ui.style.display = "flex";
                    setTimeout(() => ui.style.opacity = "1", 50);
                }, 600);
            } else {
                alert("INTRUDER ALERT: ACCESS DENIED");
                document.getElementById('passInput').value = "";
            }
        }

        // Particle System Animation
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        window.addEventListener('mousemove', (e) => {
            for(let i=0; i<2; i++) {
                particles.push({
                    x: e.x, y: e.y,
                    size: Math.random() * 4 + 1,
                    spX: (Math.random() - 0.5) * 2,
                    spY: (Math.random() - 0.5) * 2,
                    color: '#00ff41'
                });
            }
        });

        function animate() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.x += p.spX; p.y += p.spY; p.size -= 0.05;
                if(p.size <= 0.1) particles.splice(i, 1);
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        animate();

        // Chat Logic
        async function send() {
            const input = document.getElementById('userMsg');
            const flow = document.getElementById('chat-flow');
            const msg = input.value.trim();
            if(!msg) return;

            flow.innerHTML += `<div class="msg user">${msg}</div>`;
            input.value = "";
            flow.scrollTop = flow.scrollHeight;

            try {
                const response = await fetch(NGROK_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        model: "gemma2-2b-local:latest", 
                        messages: [{role: "user", content: msg}], 
                        stream: false 
                    })
                });
                const data = await response.json();
                const reply = data.message.content;
                flow.innerHTML += `<div class="msg ai">${reply}</div>`;
                confetti({ particleCount: 40, spread: 50, origin: { y: 0.9 }, colors: ['#00ff41'] });
            } catch (e) {
                flow.innerHTML += `<div class="msg ai" style="color:#ff0033">[CRITICAL]: Link Offline. Re-check Ngrok CMD.</div>`;
            }
            flow.scrollTop = flow.scrollHeight;
        }

        document.getElementById('userMsg').addEventListener('keypress', (e) => { if(e.key === 'Enter') send() });
        document.getElementById('sys-time').innerText = new Date().toLocaleTimeString();
    </script>
</body>
</html>
