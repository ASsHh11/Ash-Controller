<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARSLAN-ASH AI | SUPREME COCKPIT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --cyan: #00d9ff; --glass: rgba(0, 5, 10, 0.8); --border: rgba(0, 217, 255, 0.2); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; overflow: hidden; background: #000; font-family: 'Rajdhani', sans-serif; color: #fff; }

        canvas { position: absolute; inset: 0; z-index: 1; display: block; }

        /* UI Structure */
        .header { position: fixed; top: 0; width: 100%; height: 80px; z-index: 100; text-align: center; padding-top: 20px; background: linear-gradient(to bottom, #000, transparent); }
        .header h1 { font-family: 'Orbitron', sans-serif; color: var(--cyan); letter-spacing: 8px; text-shadow: 0 0 20px var(--cyan); font-size: 1.4rem; }

        .panel { position: fixed; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 10px; z-index: 150; padding: 20px; transition: 0.5s; box-shadow: 0 0 30px #000; }
        .panel.hidden { opacity: 0; transform: translateX(-100%); pointer-events: none; }

        .l-panel { left: 20px; top: 100px; bottom: 140px; width: 350px; display: flex; flex-direction: column; }
        .r-panel { right: 20px; top: 100px; width: 300px; }

        .viewport { width: 100%; height: 200px; border: 2px solid var(--cyan); border-radius: 50%; overflow: hidden; position: relative; margin: 15px 0; background: #000; box-shadow: inset 0 0 20px var(--cyan); }
        #pc-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        
        #log { flex-grow: 1; overflow-y: auto; scrollbar-width: none; font-size: 0.8rem; margin-top: 10px; }
        .log-line { margin-bottom: 10px; border-left: 2px solid var(--cyan); padding-left: 10px; animation: fadeIn 0.5s; }
        .tag { font-size: 0.6rem; color: var(--cyan); letter-spacing: 2px; display: block; }

        .input-hub { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 800px; z-index: 200; background: rgba(0,0,0,0.8); border: 1px solid var(--border); border-radius: 50px; display: flex; padding: 8px; }
        input { flex-grow: 1; background: transparent; border: none; color: #fff; padding: 10px 20px; outline: none; font-size: 1rem; font-family: 'Rajdhani', sans-serif; }
        .btn { background: var(--cyan); color: #000; border: none; padding: 0 30px; border-radius: 30px; cursor: pointer; font-weight: bold; letter-spacing: 1px; transition: 0.3s; }
        .btn:hover { box-shadow: 0 0 20px var(--cyan); transform: scale(1.05); }

        .toggle { position: fixed; left: 0; top: 50%; width: 35px; height: 80px; background: rgba(0,217,255,0.1); border: 1px solid var(--cyan); border-radius: 0 10px 10px 0; z-index: 300; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--cyan); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="header"><h1>ARSLAN-ASH AI</h1></div>
<div class="toggle" onclick="toggleUI()">❮</div>

<div class="panel l-panel" id="l-p">
    <span class="tag">NEURAL_HISTORY</span>
    <div id="log"><div class="log-line">System Online. Galaxy Map Calibrated.</div></div>
</div>

<div class="panel r-panel" id="r-p">
    <span class="tag">LIVE_TELEMETRY</span>
    <div class="viewport">
        <img id="pc-img" src="">
        <div id="status" style="display:flex; height:100%; align-items:center; justify-content:center; color:#222; font-size:0.6rem; letter-spacing:3px;">LINK_READY</div>
    </div>
</div>

<div class="input-hub">
    <input type="text" id="cmd" placeholder="Execute Neural Command..." autocomplete="off">
    <button class="btn" onclick="execute()">RUN</button>
</div>

<script>
    const DB = "https://sh-controller-default-rtdb.firebaseio.com/";
    let scene, camera, renderer, galaxy, zoom = 1;

    // --- Start only when window is ready ---
    window.onload = () => {
        init();
        animate();
    };

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 5000);
        camera.position.set(0, 500, 1200);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Realistic Spiral Galaxy
        const geo = new THREE.BufferGeometry();
        const count = 20000;
        const pos = new Float32Array(count * 3);
        const cols = new Float32Array(count * 3);

        for(let i=0; i<count; i++) {
            let arm = i % 5;
            let angle = (i / count) * Math.PI * 18 + (arm * (Math.PI * 2 / 5));
            let dist = Math.pow(Math.random(), 0.5) * 900;
            pos[i*3] = Math.cos(angle) * dist + (Math.random()-0.5)*60;
            pos[i*3+1] = (Math.random()-0.5) * 50;
            pos[i*3+2] = Math.sin(angle) * dist + (Math.random()-0.5)*60;
            
            let color = new THREE.Color(i % 15 === 0 ? 0x00d9ff : 0xffffff);
            cols[i*3] = color.r; cols[i*3+1] = color.g; cols[i*3+2] = color.b;
        }

        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(cols, 3));
        const mat = new THREE.PointsMaterial({ size: 2, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true, opacity: 0.8 });
        galaxy = new THREE.Points(geo, mat);
        scene.add(galaxy);
    }

    function animate() {
        requestAnimationFrame(animate);
        galaxy.rotation.y += 0.001;
        camera.position.z = THREE.MathUtils.lerp(camera.position.z, 1200 / zoom, 0.05);
        renderer.render(scene, camera);
    }

    function toggleUI() {
        document.getElementById('l-p').classList.toggle('hidden');
        document.getElementById('r-p').classList.toggle('hidden');
    }

    async function execute() {
        const inp = document.getElementById('cmd');
        const val = inp.value.trim(); if(!val) return;
        const ts = Date.now();
        const log = document.getElementById('log');
        log.innerHTML += `<div class="log-line"><span class="tag">REQUEST</span>${val}</div>`;
        inp.value = "";

        await fetch(`${DB}current.json`, { method: "PUT", body: JSON.stringify({ cmd: val, time: ts, resp: "PENDING", img: "" }) });

        const sync = setInterval(async () => {
            const r = await fetch(`${DB}current.json`).then(d => d.json());
            if(r.time == ts && r.resp !== "PENDING") {
                log.innerHTML += `<div class="log-line"><span class="tag" style="color:#fff">AI</span>${r.resp}</div>`;
                if(r.img) {
                    const img = document.getElementById('pc-img');
                    img.src = r.img; img.style.display = 'block';
                    document.getElementById('status').style.display = 'none';
                }
                log.scrollTop = 99999;
                clearInterval(sync);
            }
        }, 1000);
    }

    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
