<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARSLAN-ASH AI | IMPERIAL GALAXY</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { 
            --crystal-blue: #00f2ff; 
            --glass-core: rgba(0, 10, 20, 0.4); 
            --glass-border: rgba(0, 242, 255, 0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; overflow: hidden; background: #000; font-family: 'Montserrat', sans-serif; color: #fff; }
        
        #galaxy-v5 { position: absolute; inset: 0; z-index: 1; }

        /* UI Top Header */
        .header-system { position: fixed; top: 25px; width: 100%; text-align: center; z-index: 100; pointer-events: none; }
        .header-system h1 { 
            font-family: 'Cinzel', serif; font-size: 1.6rem; letter-spacing: 12px; 
            color: var(--crystal-blue); text-shadow: 0 0 25px rgba(0, 242, 255, 0.6); 
            text-transform: uppercase;
        }

        /* Side Toggle Controllers */
        .toggle-btn {
            position: fixed; left: 0; top: 50%; width: 35px; height: 80px;
            background: var(--glass-core); border: 1px solid var(--crystal-blue);
            color: var(--crystal-blue); z-index: 200; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            border-radius: 0 10px 10px 0; transition: 0.3s; backdrop-filter: blur(10px);
        }
        .toggle-btn:hover { background: var(--crystal-blue); color: #000; }

        /* Liquid Glass Panels */
        .panel {
            position: fixed; background: var(--glass-core); backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 20px; z-index: 150;
            padding: 25px; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        .panel.hidden { opacity: 0; transform: scale(0.9) translateX(-100%); pointer-events: none; }
        .panel.hidden-r { opacity: 0; transform: scale(0.9) translateX(100%); pointer-events: none; }

        .l-panel { left: 20px; top: 100px; bottom: 130px; width: 380px; display: flex; flex-direction: column; }
        .r-panel { right: 20px; top: 100px; width: 320px; }

        /* Visual Telemetry */
        .viewport-orb { 
            width: 100%; height: 200px; background: #000; border-radius: 50%; 
            border: 1px solid var(--glass-border); overflow: hidden; position: relative;
            margin-bottom: 20px; box-shadow: inset 0 0 30px rgba(0, 242, 255, 0.1);
        }
        #pc-frame { width: 100%; height: 100%; object-fit: cover; display: none; }
        .tag { font-size: 0.6rem; letter-spacing: 3px; color: var(--crystal-blue); text-transform: uppercase; margin-bottom: 8px; display: block; }

        #log-area { flex-grow: 1; overflow-y: auto; scrollbar-width: none; font-size: 0.85rem; line-height: 1.6; }
        .entry { margin-bottom: 15px; border-left: 2px solid var(--crystal-blue); padding-left: 15px; animation: fadeIn 0.5s ease; }

        /* Command Center Hub */
        .hub-footer {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 950px; z-index: 100;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border); border-radius: 50px;
            display: flex; padding: 10px; gap: 15px; align-items: center;
        }
        input { flex-grow: 1; background: transparent; border: none; color: #fff; padding: 12px 25px; outline: none; font-size: 1rem; }
        .btn-core { 
            background: rgba(0, 242, 255, 0.1); color: var(--crystal-blue); 
            border: 1px solid var(--crystal-blue); padding: 10px 25px; 
            border-radius: 40px; cursor: pointer; font-weight: bold; 
            font-size: 0.7rem; letter-spacing: 2px; transition: 0.3s;
        }
        .btn-core:hover { background: var(--crystal-blue); color: #000; box-shadow: 0 0 20px var(--crystal-blue); }

        @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="galaxy-v5"></div>

<div class="header-system"><h1>ARSLAN-ASH AI</h1></div>

<div class="toggle-btn" onclick="togglePanels()">❮</div>

<div class="panel l-panel" id="ui-l">
    <span class="tag">NEURAL_HISTORY_LOG</span>
    <div id="log-area">
        <div class="entry">Imperial Cockpit Synced. Full Deep Space Scan Calibrated.</div>
    </div>
</div>

<div class="panel r-panel" id="ui-r">
    <span class="tag">LIVE_TELEMETRY</span>
    <div class="viewport-orb">
        <img id="pc-frame" src="">
        <div id="status" style="display:flex; height:100%; align-items:center; justify-content:center; color:#222; font-size:0.5rem; letter-spacing:4px;">PC VIEW - [OK]</div>
    </div>
    <p style="font-size: 0.6rem; color: #444; text-align: center;">V5.0 NEURAL GALAXY ENGINE</p>
</div>

<div class="hub-footer">
    <input type="text" id="cmd" placeholder="Command the Core..." autocomplete="off">
    <button class="btn-core" onclick="zoom(0.8)">ZOOM -</button>
    <button class="btn-core" onclick="zoom(1.2)">ZOOM +</button>
    <button class="btn-core" style="background:var(--crystal-blue); color:#000;" onclick="execute()">EXECUTE</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    const DB = "https://sh-controller-default-rtdb.firebaseio.com/";
    let scene, camera, renderer, galaxy;
    let targetZoom = 1;

    // --- 3D GALAXY ENGINE (REAL SPIRAL) ---
    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 10000);
        camera.position.z = 1000;

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('galaxy-v5').appendChild(renderer.domElement);

        const geo = new THREE.BufferGeometry();
        const count = 15000;
        const pos = new Float32Array(count * 3);
        const col = new Float32Array(count * 3);

        for(let i=0; i<count; i++) {
            let arm = i % 4;
            let angle = (i / count) * Math.PI * 18 + (arm * (Math.PI * 2 / 4));
            let dist = Math.pow(Math.random(), 0.6) * 900;
            
            // Spiral math for realistic galaxy
            pos[i*3] = Math.cos(angle) * dist + (Math.random()-0.5)*60;
            pos[i*3+1] = (Math.random()-0.5)*40;
            pos[i*3+2] = Math.sin(angle) * dist + (Math.random()-0.5)*60;
            
            // Diamond Blue & White star mix
            if(i % 10 === 0) { col[i*3]=0; col[i*3+1]=0.95; col[i*3+2]=1; }
            else { col[i*3]=1; col[i*3+1]=1; col[i*3+2]=1; }
        }

        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
        
        const mat = new THREE.PointsMaterial({ 
            size: 1.8, vertexColors: true, transparent: true, opacity: 0.7, 
            blending: THREE.AdditiveBlending 
        });
        
        galaxy = new THREE.Points(geo, mat);
        scene.add(galaxy);
    }

    function animate() {
        requestAnimationFrame(animate);
        galaxy.rotation.y += 0.0008; // Realistic slow drift
        galaxy.scale.lerp(new THREE.Vector3(targetZoom, targetZoom, targetZoom), 0.1);
        renderer.render(scene, camera);
    }

    function zoom(amt) { targetZoom *= amt; targetZoom = Math.min(Math.max(0.2, targetZoom), 100); }

    function togglePanels() {
        document.getElementById('ui-l').classList.toggle('hidden');
        document.getElementById('ui-r').classList.toggle('hidden-r');
        document.querySelector('.toggle-btn').innerText = document.getElementById('ui-l').classList.contains('hidden') ? '❯' : '❮';
    }

    async function execute() {
        const inp = document.getElementById('cmd');
        const val = inp.value.trim(); if(!val) return;
        const ts = Date.now();
        const log = document.getElementById('log-area');
        log.innerHTML += `<div class="entry"><span class="tag">REQ</span>${val}</div>`;
        inp.value = "";
        log.scrollTop = log.scrollHeight;

        await fetch(`${DB}current.json`, { method: "PUT", body: JSON.stringify({ cmd: val, time: ts, resp: "PENDING", img: "" }) });

        const sync = setInterval(async () => {
            const r = await fetch(`${DB}current.json`).then(d => d.json());
            if(r.time == ts && r.resp !== "PENDING") {
                log.innerHTML += `<div class="entry"><span class="tag" style="color:#fff">AI</span>${r.resp}</div>`;
                if(r.img) {
                    const frame = document.getElementById('pc-frame');
                    frame.src = r.img; frame.style.display = 'block';
                    document.getElementById('status').style.display = 'none';
                }
                log.scrollTop = log.scrollHeight;
                clearInterval(sync);
            }
        }, 1000);
    }

    init(); animate();
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
