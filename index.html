<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARSLAN-ASH AI | ARCHITECT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ffcc; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; overflow: hidden; background: #000; font-family: 'Montserrat', sans-serif; color: #fff; }
        
        #vanta-bg { position: absolute; width: 100%; height: 100%; z-index: 1; }

        /* Click Animation Circle */
        .click-effect {
            position: absolute; border: 2px solid var(--accent); border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none;
            animation: ripple 0.6s ease-out; z-index: 999;
        }
        @keyframes ripple { from { width: 0; height: 0; opacity: 1; } to { width: 100px; height: 100px; opacity: 0; } }

        .ui-container {
            position: relative; z-index: 10; display: flex; height: 100vh; width: 100vw;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(5px);
        }

        /* Responsive Layout */
        @media (max-width: 900px) { .ui-container { flex-direction: column; overflow-y: auto; } .sidebar { width: 100% !important; height: auto !important; } }

        .sidebar { width: 350px; background: rgba(5,5,5,0.8); border-right: 1px solid rgba(0,255,204,0.1); padding: 30px; display: flex; flex-direction: column; }
        .logo { font-size: 1.2rem; letter-spacing: 5px; color: var(--accent); margin-bottom: 40px; font-weight: 600; text-align: center; }

        .chat-zone { flex-grow: 1; display: flex; flex-direction: column; padding: 30px; }
        #terminal { flex-grow: 1; overflow-y: auto; margin-bottom: 20px; scrollbar-width: none; }
        .msg { margin-bottom: 20px; animation: slideIn 0.4s ease; }
        .user-label { color: #444; font-size: 0.6rem; letter-spacing: 2px; margin-bottom: 5px; text-transform: uppercase; }
        .ai-text { border-left: 2px solid var(--accent); padding-left: 15px; font-size: 0.95rem; line-height: 1.6; font-weight: 300; }

        .viewport { width: 100%; max-width: 500px; margin: 0 auto 20px auto; background: #000; border: 1px solid #111; overflow: hidden; }
        #live-frame { width: 100%; display: none; }

        .input-wrap { display: flex; background: rgba(255,255,255,0.03); border: 1px solid rgba(0,255,204,0.2); padding: 5px; border-radius: 5px; }
        input { flex-grow: 1; background: transparent; border: none; color: #fff; padding: 15px; outline: none; font-size: 1rem; }
        .send-btn { background: var(--accent); color: #000; border: none; padding: 0 25px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .send-btn:hover { background: #fff; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body id="vanta-bg">

<div class="ui-container">
    <div class="sidebar">
        <div class="logo">ARSLAN-ASH AI</div>
        <div class="viewport">
            <img id="live-frame" src="">
            <div id="no-signal" style="padding:40px; text-align:center; color:#222; font-size:0.7rem;">NO VISUAL LINK</div>
        </div>
        <p style="font-size: 0.6rem; color: #333; text-align: center;">V5.0 ARCHITECT EDITION</p>
    </div>

    <div class="chat-zone">
        <div id="terminal">
            <div class="msg"><div class="ai-text">System Online. Neural interface interactive.</div></div>
        </div>
        <div class="input-wrap">
            <input type="text" id="userInput" placeholder="EXECUTE COMMAND..." autocomplete="off">
            <button class="send-btn" onclick="fire()">RUN</button>
        </div>
    </div>
</div>

<script>
    const DB = "https://sh-controller-default-rtdb.firebaseio.com/";

    // 1. Interactive Background (Net Animation)
    VANTA.NET({
        el: "#vanta-bg", mouseControls: true, touchControls: true,
        gyroControls: false, minHeight: 200.0, minWidth: 200.0,
        scale: 1.0, scaleMobile: 1.0, color: 0x00ffcc,
        backgroundColor: 0x0, points: 15.0, maxDistance: 20.0, spacing: 16.0
    });

    // 2. Click/Tap Animation
    document.addEventListener('mousedown', function(e) {
        let ripple = document.createElement('div');
        ripple.className = 'click-effect';
        ripple.style.left = e.pageX + 'px';
        ripple.style.top = e.pageY + 'px';
        document.body.appendChild(ripple);
        setTimeout(() => { ripple.remove(); }, 600);
    });

    // 3. Execution Logic
    async function fire() {
        const inp = document.getElementById('userInput');
        const val = inp.value.trim();
        if(!val) return;
        const ts = Date.now();
        
        const term = document.getElementById('terminal');
        term.innerHTML += `<div class="msg"><div class="user-label">${val}</div><div id="res-${ts}" class="ai-text">Analysing...</div></div>`;
        inp.value = "";
        term.scrollTop = 99999;

        await fetch(`${DB}current.json`, { method: "PUT", body: JSON.stringify({ cmd: val, time: ts, resp: "PENDING", img: "" }) });

        const sync = setInterval(async () => {
            const r = await fetch(`${DB}current.json`).then(d => d.json());
            if(r.time == ts && r.resp !== "PENDING") {
                document.getElementById(`res-${ts}`).innerText = r.resp;
                if(r.img) {
                    const frame = document.getElementById('live-frame');
                    frame.src = r.img;
                    frame.style.display = 'block';
                    document.getElementById('no-signal').style.display = 'none';
                }
                clearInterval(sync);
            }
        }, 1000);
    }
    document.getElementById('userInput').addEventListener('keypress', e => e.key === 'Enter' && fire());
</script>
</body>
</html>
