<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arslan-Ash AI</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; overflow: hidden; height: 100%; }
        #canvas { position: absolute; inset: 0; z-index: -1; pointer-events: none; }
        #auth-overlay { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; transition: 0.5s; }
        .terminal-box { border: 2px solid var(--neon); padding: 30px; box-shadow: 0 0 30px var(--neon); background: rgba(0,0,0,0.9); width: 85%; max-width: 400px; text-align: center; }
        #main-ui { display: none; flex-direction: column; height: 100vh; max-width: 800px; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 15px; border-bottom: 1px solid #1a1a1a; scroll-behavior: smooth; }
        input { width: 100%; padding: 15px; background: #000; border: 1px solid var(--neon); color: var(--neon); margin: 10px 0; outline: none; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--neon); color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .msg { margin: 15px 0; padding: 12px; border-radius: 4px; line-height: 1.4; animation: fadeIn 0.3s; }
        .user { background: rgba(255,255,255,0.05); border-right: 3px solid #fff; margin-left: 20%; text-align: right; }
        .ai { background: rgba(0,255,65,0.05); border-left: 3px solid var(--neon); margin-right: 20%; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="auth-overlay">
        <div class="terminal-box">
            <h1 style="letter-spacing: 5px;">CORE LOGIN</h1>
            <input type="password" id="passInput" placeholder="PASSWORD..." autofocus>
            <button onclick="verify()">ACCESS CORE</button>
        </div>
    </div>
    <div id="main-ui">
        <h2 style="text-align: center; letter-spacing: 10px;">ARSLAN-ASH AI</h2>
        <div id="chat-flow"><div class="msg ai">SYSTEM LIVE. Roman Urdu Mode: ACTIVE. PC Permission: GRANTED.</div></div>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <input type="text" id="userMsg" placeholder="Command (Type 'work' for PC actions)..." autocomplete="off">
            <button style="width: 80px;" onclick="send()">SEND</button>
        </div>
    </div>
    <script>
        const MASTER_KEY = "Ash123"; 
        const NGROK_ENDPOINT = "https://eutrophic-gametogenic-carissa.ngrok-free.dev/ollama/api/chat";

        function verify() {
            if(document.getElementById('passInput').value === MASTER_KEY) {
                document.getElementById('auth-overlay').style.display = "none";
                document.getElementById('main-ui').style.display = "flex";
            } else { alert("DENIED"); }
        }

        async function send() {
            const input = document.getElementById('userMsg');
            const flow = document.getElementById('chat-flow');
            const cmd = input.value.trim();
            if(!cmd) return;

            flow.innerHTML += `<div class="msg user">${cmd}</div>`;
            input.value = "";
            flow.scrollTop = flow.scrollHeight;

            // Strict Prompting
            let finalPrompt = `Instruction: Respond ONLY in Roman Urdu (English letters like 'kaise ho'). Never use Hindi script. `;
            if(cmd.toLowerCase().startsWith("work")) {
                finalPrompt += `URGENT ACTION: The user wants to ${cmd.replace("work", "")}. You MUST generate the solution as a system command.`;
            } else {
                finalPrompt += `Conversation: ${cmd}`;
            }

            try {
                const response = await fetch(NGROK_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        model: "gemma2-2b-local:latest", 
                        messages: [{role: "user", content: finalPrompt}], 
                        stream: false 
                    })
                });
                const data = await response.json();
                flow.innerHTML += `<div class="msg ai">${data.message.content}</div>`;
                confetti({ particleCount: 30, colors: ['#00ff41'] });
            } catch (e) {
                flow.innerHTML += `<div class="msg ai" style="color:red">OFFLINE. Re-verify Ngrok Link.</div>`;
            }
            flow.scrollTop = flow.scrollHeight;
        }

        // Particle background code
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        window.addEventListener('mousemove', (e) => {
            for(let i=0; i<2; i++) particles.push({ x: e.x, y: e.y, size: Math.random()*2.5, spX: Math.random()*2-1, spY: Math.random()*2-1, color: '#00ff41' });
        });
        function animate() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.x += p.spX; p.y += p.spY; p.size -= 0.05;
                if(p.size <= 0.1) particles.splice(i, 1);
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        animate();
        document.getElementById('userMsg').addEventListener('keypress', (e) => { if(e.key === 'Enter') send() });
    </script>
</body>
</html>
